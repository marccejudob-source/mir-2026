name: Recoger Adjudicaciones MIR

on:
  schedule:
    # Cada 2 horas
    - cron: '0 */2 * * *'
  # También permitir ejecución manual
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Recoger adjudicaciones
        run: node scripts/fetch_adjudicadas.js

      - name: Commit y push cambios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/adjudicadas_historial.json data/vacantes.json
          git diff --staged --quiet || git commit -m "📊 Actualización datos $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
