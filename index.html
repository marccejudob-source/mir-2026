<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elección MIR 2026 Lou ❤️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a1628;
            color: #e6edf3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        #map { flex: 1; height: 100vh; z-index: 1; }
        .leaflet-container { background: #d4dadc; }
        .total-badge {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(10, 22, 40, 0.9); border: 1px solid #1e3a5f;
            border-radius: 10px; padding: 10px 15px; backdrop-filter: blur(10px);
        }
        .total-badge .number { font-size: 1.8rem; font-weight: 700; color: #64b5f6; }
        .total-badge .label { font-size: 0.7rem; color: #7b8fa3; text-transform: uppercase; letter-spacing: 0.5px; }
        .panel {
            width: 360px; height: 100vh;
            background: linear-gradient(180deg, #0f2337 0%, #0a1a2e 100%);
            border-left: 1px solid rgba(30, 58, 95, 0.5);
            display: flex; flex-direction: column; z-index: 1000; overflow: hidden;
        }
        .panel-header {
            padding: 18px 16px; border-bottom: 1px solid rgba(30, 58, 95, 0.4);
            background: rgba(17, 34, 64, 0.6);
        }
        .panel-header h2 { font-size: 1.05rem; font-weight: 700; color: #ffffff; }
        .panel-filters { flex: 1; overflow-y: auto; padding: 14px; }
        .filter-group { margin-bottom: 16px; }
        .filter-group-title {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.73rem; color: #a8c4db; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
            cursor: pointer; user-select: none;
        }
        .filter-group-title:hover { color: #ffffff; }
        .filter-group-title .count {
            background: rgba(30, 136, 229, 0.15); border: 1px solid rgba(30, 136, 229, 0.3);
            padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; color: #64b5f6; font-weight: 700;
        }
        .checkbox-list {
            max-height: 200px; overflow-y: auto;
            background: rgba(8, 21, 37, 0.6); border: 1px solid rgba(30, 58, 95, 0.5);
            border-radius: 0 0 12px 12px; padding: 8px;
        }
        .checkbox-item {
            display: flex; align-items: center; padding: 6px 8px;
            border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .checkbox-item:hover { background: rgba(30, 136, 229, 0.08); }
        .checkbox-item input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 16px; height: 16px; border: 2px solid rgba(100, 140, 180, 0.5);
            border-radius: 5px; margin-right: 10px; cursor: pointer;
            position: relative; flex-shrink: 0; transition: all 0.2s;
        }
        .checkbox-item input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #1e88e5, #42a5f5);
            border-color: #42a5f5; box-shadow: 0 2px 6px rgba(30, 136, 229, 0.3);
        }
        .checkbox-item input[type="checkbox"]:checked::after {
            content: '✓'; position: absolute; top: 0px; left: 3px;
            font-size: 10px; color: white; font-weight: bold;
        }
        .checkbox-item span { font-size: 0.8rem; color: #f0f4f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .filter-search {
            width: 100%; background: rgba(8, 21, 37, 0.8);
            border: 1px solid rgba(30, 58, 95, 0.5); border-bottom: none;
            color: #ffffff; padding: 9px 12px; border-radius: 12px 12px 0 0;
            font-size: 0.8rem; font-family: inherit; outline: none;
        }
        .filter-search::placeholder { color: rgba(160, 185, 210, 0.5); }
        .filter-search:focus { border-color: #1e88e5; }
        .btn-apply {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            border: none; color: white; border-radius: 12px; font-weight: 600;
            cursor: pointer; margin-top: 12px; font-size: 0.9rem; font-family: inherit;
            transition: all 0.2s; box-shadow: 0 2px 8px rgba(30, 136, 229, 0.2);
        }
        .btn-apply:hover { box-shadow: 0 4px 20px rgba(30, 136, 229, 0.4); transform: translateY(-1px); }
        .btn-refresh-data {
            width: 100%; padding: 10px; background: transparent;
            border: 1px solid rgba(30, 58, 95, 0.5); color: #a8c4db;
            border-radius: 12px; cursor: pointer; margin-top: 8px;
            font-size: 0.8rem; font-family: inherit; transition: all 0.2s;
        }
        .btn-refresh-data:hover { border-color: #64b5f6; color: #ffffff; }
        .info-panel {
            position: fixed; top: 50%; right: 360px; transform: translateY(-50%);
            width: 340px; max-height: 70vh; overflow-y: auto; padding: 20px;
            background: rgba(13, 31, 53, 0.95); border: 1px solid #1e3a5f;
            border-radius: 14px; backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: none; z-index: 2000;
        }
        .info-panel.active { display: block; }
        .info-panel h3 { font-size: 0.9rem; color: #64b5f6; margin-bottom: 8px; padding-right: 25px; }
        .info-panel-close {
            position: absolute; top: 12px; right: 14px; width: 24px; height: 24px;
            background: rgba(239, 83, 80, 0.15); border: 1px solid rgba(239, 83, 80, 0.3);
            border-radius: 50%; color: #ef5350; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .info-panel-close:hover { background: rgba(239, 83, 80, 0.3); }
        .info-item { background: #081525; border: 1px solid #1e3a5f; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .info-item .especialidad { font-weight: 600; color: #e6edf3; font-size: 0.85rem; }
        .info-item .plazas-status { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .info-item .plazas-bar { flex: 1; height: 6px; background: #1e3a5f; border-radius: 3px; overflow: hidden; }
        .info-item .plazas-bar-fill { height: 100%; background: linear-gradient(90deg, #ef5350, #ff7043); border-radius: 3px; }
        .info-item .plazas-text { font-size: 0.75rem; color: #7b8fa3; white-space: nowrap; }
        .info-item .aspirante-num {
            display: inline-block; background: rgba(239, 83, 80, 0.15);
            color: #ef5350; border: 1px solid rgba(239, 83, 80, 0.3);
            padding: 2px 6px; border-radius: 4px; margin: 2px 3px 2px 0;
            font-size: 0.7rem; font-weight: 600;
        }
        .leaflet-tooltip.custom-tooltip {
            background: rgba(10, 22, 40, 0.95); border: 1px solid #1e3a5f;
            color: #e6edf3; border-radius: 6px; padding: 6px 10px; font-size: 0.8rem;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 83, 80, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 83, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 83, 80, 0); }
        }
        .red-dot {
            width: 14px; height: 14px; background: radial-gradient(circle, #ff6b6b, #ef5350);
            border-radius: 50%; opacity: 0.85; animation: pulse-red 2s infinite;
            cursor: pointer; transition: transform 0.2s;
        }
        .red-dot:hover { transform: scale(1.5); opacity: 1; }
        .gray-dot {
            width: 14px; height: 14px; background: radial-gradient(circle, #9e9e9e, #616161);
            border-radius: 50%; opacity: 0.6; cursor: pointer; transition: transform 0.2s;
        }
        .gray-dot:hover { transform: scale(1.5); opacity: 0.9; }
        .loading-text { position: fixed; bottom: 15px; left: 15px; z-index: 1000; color: #3a5a7a; font-size: 0.75rem; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0d1f35; }
        ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
        /* Mobile toggle button */
        .mobile-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1500;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            border: none; color: white; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(30, 136, 229, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .mobile-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(30, 136, 229, 0.6); }
        .mobile-toggle.active { background: linear-gradient(135deg, #ef5350, #c62828); box-shadow: 0 4px 16px rgba(239, 83, 80, 0.5); }
        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #map { width: 100%; height: 100vh; }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .panel {
                position: fixed; bottom: 0; left: 0; right: 0;
                width: 100%; height: 60vh;
                border-left: none; border-top: 1px solid rgba(30, 58, 95, 0.5);
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            }
            .panel.open { transform: translateY(0); }
            .panel-header {
                border-radius: 20px 20px 0 0;
                text-align: center;
                position: relative;
            }
            .panel-header::before {
                content: ''; display: block; width: 40px; height: 4px;
                background: rgba(255,255,255,0.3); border-radius: 2px;
                margin: 0 auto 10px; 
            }
            .total-badge { top: 10px; left: 10px; padding: 8px 12px; }
            .total-badge .number { font-size: 1.3rem; }
            .total-badge .label { font-size: 0.6rem; }
            .info-panel {
                position: fixed; top: auto; bottom: 80px; left: 10px; right: 10px;
                width: auto; max-height: 50vh; transform: none;
                border-radius: 14px;
            }
            .loading-text { bottom: 10px; left: 10px; font-size: 0.65rem; max-width: 70%; }
            .leaflet-control-zoom { display: none; }
        }

</head>

            </div>

                <div class="checkbox-list" id="espList"></div>
            </div>
            <div class="filter-group">

                <div class="checkbox-list" id="hospList"></div>
            </div>
            <button class="btn-apply" onclick="applyFilters()">🔍 Aplicar filtros</button>
            <button class="btn-refresh-data" onclick="refreshData()">🔄 Actualizar datos</button>
        </div>
    </div>
    <div class="info-panel" id="infoPanel">

        // Función para obtener CCAA de una localidad (fuzzy matching)
        function getCCAA(loc) {
            if (!loc) return 'Otras';
            if (CCAA_MAP[loc]) return CCAA_MAP[loc];
            // Try normalized
            const norm = loc.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            for (const [k, v] of Object.entries(CCAA_MAP)) {
                const kNorm = k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                if (norm === kNorm) return v;
                if (norm.includes(kNorm.split('/')[0].trim()) || kNorm.includes(norm.split('/')[0].trim())) return v;
            }
            return 'Otras';
        }

        let vacantesData = [], adjudicadasData = [], map = null, markersLayer = null;

        function initMap() {
            map = L.map('map', { center: [40.0, -3.5], zoom: 6, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        async function refreshData() {
            setLoading('Cargando datos...');
            try {
                // Load both JSON files from the repo (updated every 2h by GitHub Actions)
                const [vacRes, adjRes] = await Promise.all([
                    fetch(VACANTES_URL + '?t=' + Date.now()),
                    fetch(HISTORIAL_URL + '?t=' + Date.now())
                ]);

                if (!vacRes.ok || !adjRes.ok) throw new Error('No se pudieron cargar los datos');

                const vacData = await vacRes.json();
                const adjData = await adjRes.json();

                vacantesData = vacData.vacantes || [];
                adjudicadasData = adjData.adjudicaciones || [];

                // Add exhausted specialties from adjudicadas
                const adjGroups = {};
                adjudicadasData.forEach(a => {
                    const key = `${a.descentro}|${a.codespec}`;
                    if (!adjGroups[key]) adjGroups[key] = a;
                });
                Object.values(adjGroups).forEach(a => {
                    const exists = vacantesData.some(v =>
                        v.codigoEspecialidad === a.codespec &&
                        ((v.codigoCentro && a.codcenho && v.codigoCentro === a.codcenho) ||
                         (v.centro && a.descentro && v.centro === a.descentro))
                    );
                    if (!exists && a.descentro && a.desespec) {
                        vacantesData.push({
                            centro: a.descentro, localidad: a.localich || '',
                            especialidad: a.desespec, codigoEspecialidad: a.codespec,
                            codigoCentro: a.codcenho,
                            codigoTitulacion: 'M', numeroPlazas: 0
                        });
                    }
                });

                document.getElementById('totalPlazas').textContent = vacantesData.reduce((s, d) => s + d.numeroPlazas, 0).toLocaleString('es-ES');
                populateFilters();
                const lastUpdate = vacData.lastUpdate ? new Date(vacData.lastUpdate).toLocaleString('es-ES') : '?';
                setLoading(`✓ ${vacantesData.length} registros · ${adjudicadasData.length} adjudicaciones · Actualizado: ${lastUpdate}`);
            } catch(e) {
                setLoading('Error: ' + e.message);
            }
        }

        function populateFilters() {
            const provs = [...new Set(vacantesData.map(d => d.localidad))].sort();
            const esps = [...new Set(vacantesData.map(d => d.especialidad))].sort();
            const hosps = [...new Set(vacantesData.map(d => d.centro))].sort();
            buildCheckboxList('prov', provs);
            buildCheckboxList('esp', esps);
            buildCheckboxList('hosp', hosps);
        }

        function buildCheckboxList(prefix, items) {
            const container = document.getElementById(`${prefix}List`);
            
            if (prefix === 'prov') {
                // Group by CCAA
                const groups = {};
                items.forEach(item => {
                    const ccaa = getCCAA(item);
                    if (!groups[ccaa]) groups[ccaa] = [];
                    groups[ccaa].push(item);
                });
                // Sort CCAA names, but put "Otras" at the end
                const ccaaOrder = Object.keys(groups).sort((a, b) => {
                    if (a === 'Otras') return 1;
                    if (b === 'Otras') return -1;
                    return a.localeCompare(b);
                });
                let html = '';
                ccaaOrder.forEach(ccaa => {
                    html += `<div class="ccaa-group" style="margin-bottom:4px;">
                        <div onclick="toggleCCAA(this)" style="display:flex;align-items:center;justify-content:space-between;padding:5px 8px;cursor:pointer;border-radius:6px;background:rgba(30,136,229,0.06);margin-bottom:2px;">
                            <span style="font-size:0.72rem;font-weight:600;color:#64b5f6;">📍 ${ccaa} (${groups[ccaa].length})</span>
                            <span onclick="event.stopPropagation();selectCCAA('${ccaa}')" style="font-size:0.6rem;color:#66bb6a;cursor:pointer;padding:2px 6px;border:1px solid rgba(102,187,106,0.3);border-radius:4px;">✓</span>
                        </div>
                        <div class="ccaa-items">`;
                    groups[ccaa].sort().forEach(item => {
                        html += `<label class="checkbox-item" data-value="${item.toLowerCase()}" data-ccaa="${ccaa}">
                            <input type="checkbox" value="${item}" onchange="updateCount('prov')">
                            <span title="${item}">${item}</span>
                        </label>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = items.map(item =>
                    `<label class="checkbox-item" data-value="${item.toLowerCase()}">
                        <input type="checkbox" value="${item}" onchange="updateCount('${prefix}')">
                        <span title="${item}">${item}</span>
                    </label>`
                ).join('');
            }
            updateCount(prefix);
        }

        function selectCCAA(ccaa) {
            document.querySelectorAll(`#provList .checkbox-item[data-ccaa="${ccaa}"] input`).forEach(cb => cb.checked = true);
            updateCount('prov');
        }
        function toggleCCAA(el) {
            const items = el.nextElementSibling;
            items.style.display = items.style.display === 'none' ? '' : 'none';
        }

        function updateCount(prefix) {
            document.getElementById(`${prefix}Count`).textContent = document.querySelectorAll(`#${prefix}List input:checked`).length;
        }
        function filterCheckboxes(prefix, q) {
            document.querySelectorAll(`#${prefix}List .checkbox-item`).forEach(item => {
                item.style.display = item.dataset.value.includes(q.toLowerCase()) ? 'flex' : 'none';
            });
        }
        function toggleFilter(prefix) { document.getElementById(`${prefix}List`).classList.toggle('collapsed'); }
        function selectAll(prefix) { document.querySelectorAll(`#${prefix}List input`).forEach(cb => cb.checked = true); updateCount(prefix); }
        function deselectAll(prefix) { document.querySelectorAll(`#${prefix}List input`).forEach(cb => cb.checked = false); updateCount(prefix); }
        function getChecked(prefix) { return Array.from(document.querySelectorAll(`#${prefix}List input:checked`)).map(cb => cb.value); }

        function applyFilters() {
            const sp = getChecked('prov'), se = getChecked('esp'), sh = getChecked('hosp');
            if (!sp.length && !se.length && !sh.length) { markersLayer.clearLayers(); return; }
            let filtered = vacantesData;
            if (sp.length) filtered = filtered.filter(d => sp.includes(d.localidad));
            if (se.length) filtered = filtered.filter(d => se.includes(d.especialidad));
            if (sh.length) filtered = filtered.filter(d => sh.includes(d.centro));

            const groups = {};
            filtered.forEach(d => {
                const key = `${d.centro}|${d.localidad}`;
                if (!groups[key]) groups[key] = { centro: d.centro, localidad: d.localidad, plazas: [] };
                groups[key].plazas.push(d);
            });

            markersLayer.clearLayers();
            Object.values(groups).forEach(g => {
                const coords = getCityCoords(g.localidad);
                if (!coords) return;
                const lat = coords[0] + (Math.random() - 0.5) * 0.02;
                const lng = coords[1] + (Math.random() - 0.5) * 0.02;
                const hasAvailable = g.plazas.some(p => p.numeroPlazas > 0);
                const icon = L.divIcon({ className: '', html: `<div class="${hasAvailable ? 'red-dot' : 'gray-dot'}"></div>`, iconSize: [14,14], iconAnchor: [7,7] });
                const marker = L.marker([lat, lng], { icon });
                marker.bindTooltip(`<b>${g.centro}</b>${hasAvailable ? '' : ' (sin plazas)'}<br>${g.localidad}`, { className: 'custom-tooltip', direction: 'top', offset: [0,-10] });
                marker.on('click', () => showInfo(g));
                markersLayer.addLayer(marker);
            });
            setLoading(`${Object.keys(groups).length} hospitales · ${filtered.length} registros`);
        }

        function showInfo(group) {
            document.getElementById('infoPanel').classList.add('active');
            document.getElementById('infoPanelTitle').textContent = `🏥 ${group.centro}`;
            let html = `<div style="font-size:0.75rem;color:#7b8fa3;margin-bottom:10px;">${group.localidad}</div>`;
            group.plazas.forEach(plaza => {
                // Match by codigoCentro/codcenho (numeric ID) for exact matching
                const adj = adjudicadasData.filter(a => {
                    if (a.codespec !== plaza.codigoEspecialidad) return false;
                    // Use numeric center code if available (most reliable)
                    if (plaza.codigoCentro && a.codcenho) return a.codcenho === plaza.codigoCentro;
                    // Fallback: exact name match
                    return a.descentro && a.descentro === group.centro;
                });
                const total = plaza.numeroPlazas + adj.length;
                const pct = total > 0 ? (adj.length / total * 100) : 0;
                html += `<div class="info-item">
                    <div class="especialidad">${plaza.especialidad}</div>
                    <div class="plazas-status"><div class="plazas-bar"><div class="plazas-bar-fill" style="width:${pct}%"></div></div><span class="plazas-text">${adj.length}/${total} cogidas</span></div>
                    <div style="font-size:0.75rem;color:#66bb6a;margin-top:3px;">Quedan: ${plaza.numeroPlazas}</div>`;
                if (adj.length > 0) {
                    html += `<div style="margin-top:6px;font-size:0.75rem;color:#7b8fa3;">Aspirantes: `;
                    adj.slice(0,10).forEach(a => { html += `<span class="aspirante-num">#${a.numorden}</span>`; });
                    if (adj.length > 10) html += `<span class="plazas-text"> +${adj.length-10} más</span>`;
                    html += `</div>`;
                }
                html += `</div>`;
            });
            document.getElementById('infoPanelContent').innerHTML = html;
        }

        function getCityCoords(loc) {
            if (!loc) return null;
            // Normalize: uppercase, remove accents, remove parenthetical suffixes
            let u = loc.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            // Direct match
            if (CITY_COORDS[u]) return CITY_COORDS[u];
            // Remove parenthetical like "(L')", "(EL)", "(LA)", "(LAS)", "(LOS)", "(A)"
            const cleaned = u.replace(/\s*\([^)]*\)\s*/g, '').trim();
            if (CITY_COORDS[cleaned]) return CITY_COORDS[cleaned];
            // Try first part before "/" (bilingual names like "ALICANTE / ALACANT")
            const beforeSlash = cleaned.split('/')[0].trim();
            if (CITY_COORDS[beforeSlash]) return CITY_COORDS[beforeSlash];
            // Partial match: check if name contains or is contained in a key
            for (const [k, v] of Object.entries(CITY_COORDS)) {
                if (cleaned.includes(k) || k.includes(cleaned)) return v;
                if (beforeSlash.includes(k) || k.includes(beforeSlash)) return v;
            }
            // Last resort: first word
            const firstWord = beforeSlash.split(' ')[0];
            if (firstWord.length > 3 && CITY_COORDS[firstWord]) return CITY_COORDS[firstWord];
            return null;
        }

        function closeInfo() { document.getElementById('infoPanel').classList.remove('active'); }
        function setLoading(t) { document.getElementById('loadingText').textContent = t; }

        // Init
        initMap();
        refreshData();
        // Auto-refresh every 2h
        setInterval(refreshData, 2 * 60 * 60 * 1000);
    </script>
